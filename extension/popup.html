<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LectureFind</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap');

    :root {
      --bg: #131620;
      --card: #1b1e2b;
      --border: #292d3e;
      --accent: #6c5ce7;
      --accent-l: #a29bfe;
      --green: #00b894;
      --amber: #fdcb6e;
      --text: #e4e2ed;
      --dim: #8886a0;
      --faint: #55536a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      width: 360px;
      background: var(--bg);
      color: var(--text);
      padding: 0;
    }

    /* header */
    .ext-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
    }
    .ext-header .dot { color: var(--accent-l); }

    /* form */
    .ext-form { padding: 14px 16px; }
    .ext-form label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--dim);
      font-weight: 600;
      margin-bottom: 5px;
    }
    .ext-form input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      padding: 10px 12px;
      font-size: 0.88rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .ext-form input::placeholder { color: var(--faint); }
    .ext-form input:focus { border-color: var(--accent); }

    .ext-form button {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px;
      border-radius: 7px;
      font-size: 0.88rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }
    .ext-form button:hover { background: #5a4bd1; }

    /* loading */
    #loading {
      display: none;
      text-align: center;
      padding: 16px;
      color: var(--dim);
      font-size: 0.82rem;
    }
    .spin-icon {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent-l);
      border-radius: 50%;
      animation: sp 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes sp { to { transform: rotate(360deg); } }

    /* results area */
    #results {
      max-height: 380px;
      overflow-y: auto;
      padding: 0 16px 14px;
    }
    #results::-webkit-scrollbar { width: 5px; }
    #results::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* meta pills */
    .meta-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 12px; align-items: center; }
    .meta-row .ml { font-size: 0.72rem; color: var(--faint); }
    .mpill { background: rgba(108,92,231,0.12); color: var(--accent-l); padding: 3px 8px; border-radius: 99px; font-size: 0.72rem; font-weight: 500; }

    /* clip card */
    .clip {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      transition: border-color 0.15s;
    }
    .clip:hover { border-color: var(--accent); }
    .clip-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .clip-range {
      font-family: 'Space Grotesk', monospace;
      font-size: 0.78rem;
      color: var(--green);
      background: rgba(0,184,148,0.08);
      padding: 3px 7px;
      border-radius: 4px;
      font-weight: 600;
    }
    .goto-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      width: auto;
      transition: background 0.15s;
    }
    .goto-btn:hover { background: #5a4bd1; }
    .clip-body {
      font-size: 0.8rem;
      color: var(--dim);
      line-height: 1.55;
      background: var(--bg);
      padding: 10px;
      border-radius: 6px;
    }
    .hl { color: var(--amber); background: rgba(253,203,110,0.1); padding: 0 2px; border-radius: 2px; font-weight: 600; }

    /* empty + suggestions */
    .empty-msg { text-align: center; color: var(--dim); font-size: 0.82rem; padding: 16px 0; }
    .sugg-title { font-size: 0.75rem; color: var(--dim); font-weight: 600; margin:12px 0 8px; }
    .chip {
      display: inline-block;
      background: rgba(108,92,231,0.1);
      color: var(--accent-l);
      padding: 4px 10px;
      border-radius: 99px;
      font-size: 0.72rem;
      margin: 0 5px 6px 0;
      cursor: pointer;
      border: 1px solid transparent;
      font-weight: 500;
      transition: all 0.15s;
    }
    .chip:hover { border-color: var(--accent); background: rgba(108,92,231,0.18); }

    /* error */
    .err { color: #ff7675; font-size: 0.82rem; text-align: center; padding: 10px; }
  </style>
</head>
<body>

  <div class="ext-header">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    Lecture<span class="dot">Find</span>
  </div>

  <div class="ext-form">
    <label for="conceptInput">Topic / Concept</label>
    <input type="text" id="conceptInput" placeholder="e.g. backpropagation">
    <button id="searchBtn">Search in Video</button>
  </div>

  <div id="loading"><span class="spin-icon"></span> Analysing transcript…</div>
  <div id="results"></div>

  <script src="popup.js"></script>
</body>
</html>
